name: CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1) Quality gate: lint, test, build. Runs on every push and PR.
  quality:
    name: Lint, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          retention-days: 7

  # 2) Build and publish the Docker image to GitHub Container Registry.
  #    Only on push to main (skipped for PRs).
  docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive lowercase image name
        id: img
        run: echo "name=ghcr.io/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Docker metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=raw,value=latest
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # 3) Deploy the production build to Vercel. Only on push to main.
  deploy-vercel:
    name: Deploy to Vercel
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      # Secrets can't be used in a job-level `if`, so we gate each step on the
      # token being present. With no VERCEL_TOKEN set, the job is a clean no-op
      # (green) instead of failing — deploy activates once the secret is added.
      - name: Check for Vercel token
        id: guard
        run: |
          if [ -n "$VERCEL_TOKEN" ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::notice::VERCEL_TOKEN not set — skipping Vercel deploy."
          fi

      - uses: actions/checkout@v4
        if: steps.guard.outputs.configured == 'true'

      - uses: actions/setup-node@v4
        if: steps.guard.outputs.configured == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install Vercel CLI
        if: steps.guard.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull Vercel environment
        if: steps.guard.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Build with Vercel
        if: steps.guard.outputs.configured == 'true'
        run: vercel build --prod --token="$VERCEL_TOKEN"

      - name: Deploy to production
        if: steps.guard.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
